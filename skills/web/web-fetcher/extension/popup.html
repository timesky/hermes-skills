<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { 
      width: 320px; 
      padding: 15px; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
    }
    h2 { 
      margin: 0 0 15px; 
      font-size: 16px;
      color: #333;
    }
    .relay-section {
      margin-bottom: 15px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
    }
    .relay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .relay-label {
      font-size: 13px;
      font-weight: 500;
      color: #333;
    }
    .relay-status {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
      background: #ddd;
      color: #666;
    }
    .relay-status.connected {
      background: #d4edda;
      color: #155724;
    }
    .relay-status.disconnected {
      background: #fff3cd;
      color: #856404;
    }
    .relay-status.disabled {
      background: #f8d7da;
      color: #721c24;
    }
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    input:checked + .toggle-slider {
      background-color: #007AFF;
    }
    input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }
    .toggle-text {
      font-size: 12px;
      color: #666;
    }
    .section {
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
    }
    button { 
      width: 100%; 
      padding: 8px; 
      margin: 5px 0; 
      cursor: pointer;
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
    }
    button:hover {
      background: #0056b3;
    }
    button.secondary {
      background: #f0f0f0;
      color: #333;
    }
    button.secondary:hover {
      background: #e0e0e0;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .status { 
      margin-top: 10px; 
      font-size: 12px; 
      color: #666;
      background: #f9f9f9;
      padding: 8px;
      border-radius: 4px;
    }
    .info {
      font-size: 11px;
      color: #999;
      margin-top: 10px;
    }
    .server-info {
      font-size: 11px;
      color: #888;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <h2>🌐 Hermes Web Fetcher</h2>
  
  <!-- Relay Control Section -->
  <div class="relay-section">
    <div class="relay-header">
      <span class="relay-label">WebSocket 连接</span>
      <span class="relay-status" id="relayStatusBadge">禁用</span>
    </div>
    <div class="toggle-container">
      <label class="toggle-switch">
        <input type="checkbox" id="relayToggle">
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-text" id="relayToggleText">点击启用连接</span>
    </div>
    <div class="server-info" id="serverInfo">ws://localhost:9234</div>
    
    <!-- Auto Connect Toggle -->
    <div class="toggle-container" style="margin-top: 10px; padding-top: 8px; border-top: 1px dashed #ddd;">
      <label class="toggle-switch">
        <input type="checkbox" id="autoConnectToggle">
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-text" id="autoConnectText">自动连接 (每10秒)</span>
    </div>
  </div>
  
  <div class="section">
    <button id="pageInfoBtn">📄 获取页面信息</button>
    <button id="listBtn">📋 抓取列表/收藏夹</button>
    <button id="articleBtn">📖 抓取当前文章</button>
  </div>
  
  <div class="section">
    <button id="zhihuBtn" class="secondary">知乎收藏夹</button>
    <button id="githubBtn" class="secondary">GitHub Trending</button>
  </div>
  
  <div class="status" id="status">状态：就绪</div>
  <div class="info" id="pageInfo"></div>
  
  <script src="popup.js"></script>
</body>
</html>
